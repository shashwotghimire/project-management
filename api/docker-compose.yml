services:
  redis:
    image: redis:8.8-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:18
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  api:
    build: .
    container_name: api
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - PGHOST=postgres
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    container_name: worker
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - PGHOST=postgres
    command: node dist/workers/email.worker.js
    depends_on:
      - redis

volumes:
  postgres_data:
