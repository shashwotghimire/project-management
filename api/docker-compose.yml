services:
  redis:
    image: redis:8.8-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - internal

  postgres:
    image: postgres:18
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - internal

  api:
    build: .
    container_name: api
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - PGHOST=postgres
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    depends_on:
      - postgres
      - redis
    networks:
      - internal
      - default

  worker:
    build: .
    container_name: worker
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - PGHOST=postgres
    command: node dist/worker.js
    depends_on:
      - redis
      - postgres
    networks:
      - internal
volumes:
  postgres_data:
  redis_data:

networks:
  internal:
